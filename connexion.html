<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<title>ParisVTCDriver — Connexion à votre espace</title>
<link rel="icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070a12;--navy:#0d1730;--panel:#0e1626;--panel-2:#121d33;--line:rgba(201,162,74,.16);--line-soft:rgba(255,255,255,.07);--gold:#c9a24a;--gold-2:#e7c878;--gold-bright:#f1d894;--txt:#eef2fb;--muted:#9aa6bf;--muted-2:#6f7c97;--red:#f87171;--green:#34d399}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:radial-gradient(1100px 560px at 80% -5%,rgba(201,162,74,.12),transparent 60%),radial-gradient(800px 500px at 0% 100%,rgba(20,40,90,.5),transparent 55%),linear-gradient(180deg,#070a12,#080d18 45%,#070a12);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{flex:1;display:grid;place-items:center;padding:40px 20px}
.card{width:100%;max-width:430px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(165deg,var(--panel-2),var(--panel));padding:34px 32px;box-shadow:0 40px 90px -30px rgba(0,0,0,.8)}
.brand{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:6px}
.brand .mk{width:48px;height:48px;border-radius:13px;overflow:hidden;border:1px solid var(--line);display:grid;place-items:center;flex:none}
.brand .mk img{width:100%;height:100%;object-fit:cover;display:block}
.brand b{font-size:20px}.brand b span{color:var(--gold-2)}
.brand small{display:block;font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted-2);text-align:center}
.tabs{display:flex;gap:6px;background:rgba(7,11,20,.6);border:1px solid var(--line-soft);border-radius:13px;padding:4px;margin:22px 0 22px}
.tabs button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;padding:10px;border-radius:9px;cursor:pointer;transition:.2s}
.tabs button.active{background:linear-gradient(135deg,var(--gold-bright),var(--gold) 60%,#a9842f);color:#1c1604}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted-2);margin-bottom:6px;font-weight:500}
.field input{width:100%;background:rgba(7,11,20,.75);border:1px solid var(--line-soft);color:var(--txt);font-family:inherit;font-size:14.5px;border-radius:11px;padding:12px 14px}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,74,.14)}
.btn{width:100%;font-family:inherit;font-weight:600;cursor:pointer;border:none;border-radius:12px;padding:13px;font-size:14.5px;display:inline-flex;align-items:center;gap:9px;justify-content:center;margin-top:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold) 55%,#a9842f);color:#1c1604;box-shadow:0 10px 28px -12px rgba(201,162,74,.7)}
.btn[disabled]{opacity:.6;cursor:default}
.row{display:flex;justify-content:flex-end;align-items:center;font-size:12.5px;margin:4px 0 4px}
.row a{color:var(--gold-2);cursor:pointer}
.msg{margin-top:14px;padding:11px 14px;border-radius:11px;font-size:13px;line-height:1.5;display:none}
.msg.err{display:block;border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.08);color:var(--red)}
.msg.ok{display:block;border:1px solid rgba(52,211,153,.35);background:rgba(52,211,153,.08);color:var(--green)}
.note{margin-top:18px;padding:11px 14px;border:1px solid var(--line-soft);border-radius:11px;background:rgba(96,165,250,.06);color:var(--muted);font-size:11.5px;line-height:1.5}
.foot{text-align:center;color:var(--muted-2);font-size:12px;margin-top:18px}
.foot a{color:var(--gold-2)}
.hidden{display:none}
.lang button{background:rgba(255,255,255,.05);border:1px solid var(--line-soft);color:var(--muted-2);border-radius:7px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer}
.lang button.active{background:var(--gold);color:#1a1205;border-color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand"><div class="mk"><img src="logo.png" alt="ParisVTCDriver"></div><div><b>Paris<span>VTC</span>Driver</b><small data-i18n="yourspace">Votre espace</small></div></div>

    <div class="lang" style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:14px">
      <button data-l="fr" onclick="setLang('fr')">FR</button><button data-l="en" onclick="setLang('en')">EN</button><button data-l="es" onclick="setLang('es')">ES</button><button data-l="it" onclick="setLang('it')">IT</button><button data-l="pt" onclick="setLang('pt')">PT</button><button data-l="tr" onclick="setLang('tr')">TR</button><button data-l="zh" onclick="setLang('zh')">中文</button>
    </div>

    <div class="tabs">
      <button id="tabLogin" class="active" onclick="switchTab('login')" data-i18n="tab_login">Connexion</button>
      <button id="tabSignup" onclick="switchTab('signup')" data-i18n="tab_signup">Créer un compte</button>
    </div>

    <!-- CONNEXION -->
    <form id="formLogin" onsubmit="return doLogin(event)">
      <div class="field"><label data-i18n="l_email">E-mail</label><input id="li_email" type="email" placeholder="vous@email.com" required autocomplete="email"></div>
      <div class="field"><label data-i18n="l_pwd">Mot de passe</label><input id="li_pwd" type="password" placeholder="••••••••" required autocomplete="current-password"></div>
      <div class="row"><a onclick="forgot()" data-i18n="forgot">Mot de passe oublié ?</a></div>
      <button class="btn btn-gold" type="submit" id="btnLogin" data-i18n="btn_login">Se connecter</button>
    </form>

    <!-- INSCRIPTION -->
    <form id="formSignup" class="hidden" onsubmit="return doSignup(event)">
      <div class="field"><label data-i18n="l_name">Nom complet</label><input id="su_name" type="text" placeholder="Prénom Nom" data-ph="ph_name" required autocomplete="name"></div>
      <div class="field"><label data-i18n="l_phone">Téléphone</label><input id="su_phone" type="tel" placeholder="+33 6 12 34 56 78" autocomplete="tel"></div>
      <div class="field"><label data-i18n="l_email">E-mail</label><input id="su_email" type="email" placeholder="vous@email.com" required autocomplete="email"></div>
      <div class="field"><label data-i18n="l_pwd">Mot de passe</label><input id="su_pwd" type="password" placeholder="8 caractères minimum" data-ph="ph_pwd8" required minlength="8" autocomplete="new-password"></div>
      <button class="btn btn-gold" type="submit" id="btnSignup" data-i18n="btn_signup">Créer mon compte</button>
      <div class="note" data-i18n="note_client">Tout nouveau compte est créé en tant que client. L'accès administrateur est réservé au gérant.</div>
    </form>

    <div id="msg" class="msg"></div>
    <div class="foot"><a href="index.html" data-i18n="back">← Retour au site</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js?v=2"></script>
<script>
const C={
 yourspace:{fr:"Votre espace",en:"Your area",es:"Su área",it:"La tua area",pt:"A sua área",tr:"Alanınız",zh:"您的专区"},
 tab_login:{fr:"Connexion",en:"Log in",es:"Iniciar sesión",it:"Accedi",pt:"Entrar",tr:"Giriş",zh:"登录"},
 tab_signup:{fr:"Créer un compte",en:"Sign up",es:"Crear cuenta",it:"Registrati",pt:"Criar conta",tr:"Hesap oluştur",zh:"注册"},
 l_email:{fr:"E-mail",en:"Email",es:"Email",it:"Email",pt:"Email",tr:"E-posta",zh:"邮箱"},
 l_pwd:{fr:"Mot de passe",en:"Password",es:"Contraseña",it:"Password",pt:"Palavra-passe",tr:"Şifre",zh:"密码"},
 l_name:{fr:"Nom complet",en:"Full name",es:"Nombre completo",it:"Nome completo",pt:"Nome completo",tr:"Ad soyad",zh:"全名"},
 l_phone:{fr:"Téléphone",en:"Phone",es:"Teléfono",it:"Telefono",pt:"Telefone",tr:"Telefon",zh:"电话"},
 forgot:{fr:"Mot de passe oublié ?",en:"Forgot password?",es:"¿Olvidó su contraseña?",it:"Password dimenticata?",pt:"Esqueceu a palavra-passe?",tr:"Şifremi unuttum?",zh:"忘记密码？"},
 btn_login:{fr:"Se connecter",en:"Log in",es:"Iniciar sesión",it:"Accedi",pt:"Entrar",tr:"Giriş yap",zh:"登录"},
 btn_signup:{fr:"Créer mon compte",en:"Create my account",es:"Crear mi cuenta",it:"Crea il mio account",pt:"Criar a minha conta",tr:"Hesabımı oluştur",zh:"创建账户"},
 connecting:{fr:"Connexion…",en:"Logging in…",es:"Conectando…",it:"Accesso…",pt:"A entrar…",tr:"Giriş…",zh:"登录中…"},
 creating:{fr:"Création…",en:"Creating…",es:"Creando…",it:"Creazione…",pt:"A criar…",tr:"Oluşturuluyor…",zh:"创建中…"},
 note_client:{fr:"Tout nouveau compte est créé en tant que client. L'accès administrateur est réservé au gérant.",en:"Every new account is created as a client. Administrator access is reserved for the manager.",es:"Toda cuenta nueva se crea como cliente. El acceso de administrador está reservado al gerente.",it:"Ogni nuovo account è creato come cliente. L'accesso amministratore è riservato al gestore.",pt:"Cada nova conta é criada como cliente. O acesso de administrador é reservado ao gestor.",tr:"Her yeni hesap müşteri olarak oluşturulur. Yönetici erişimi işletmeciye özeldir.",zh:"所有新账户均以客户身份创建。管理员权限仅限经营者。"},
 back:{fr:"← Retour au site",en:"← Back to site",es:"← Volver al sitio",it:"← Torna al sito",pt:"← Voltar ao site",tr:"← Siteye dön",zh:"← 返回网站"},
 ph_name:{fr:"Prénom Nom",en:"First name Last name",es:"Nombre Apellido",it:"Nome Cognome",pt:"Nome Apelido",tr:"Ad Soyad",zh:"姓名"},
 ph_pwd8:{fr:"8 caractères minimum",en:"8 characters minimum",es:"8 caracteres mínimo",it:"minimo 8 caratteri",pt:"mínimo 8 caracteres",tr:"en az 8 karakter",zh:"至少8个字符"},
 err_login:{fr:"E-mail ou mot de passe incorrect.",en:"Incorrect email or password.",es:"Email o contraseña incorrectos.",it:"Email o password errati.",pt:"Email ou palavra-passe incorretos.",tr:"E-posta veya şifre yanlış.",zh:"邮箱或密码错误。"},
 err_signup:{fr:"Création impossible.",en:"Could not create account.",es:"No se pudo crear la cuenta.",it:"Impossibile creare l'account.",pt:"Não foi possível criar a conta.",tr:"Hesap oluşturulamadı.",zh:"无法创建账户。"},
 signup_ok:{fr:"Compte créé ! Vérifiez votre boîte mail pour confirmer votre adresse, puis connectez-vous.",en:"Account created! Check your inbox to confirm your address, then log in.",es:"¡Cuenta creada! Revise su correo para confirmar su dirección y luego inicie sesión.",it:"Account creato! Controlla la tua email per confermare l'indirizzo, poi accedi.",pt:"Conta criada! Verifique o seu email para confirmar o endereço e depois entre.",tr:"Hesap oluşturuldu! Adresinizi onaylamak için e-postanızı kontrol edin, sonra giriş yapın.",zh:"账户已创建！请查收邮件确认地址后登录。"},
 forgot_need:{fr:"Entrez d'abord votre e-mail ci-dessus, puis recliquez.",en:"Enter your email above first, then click again.",es:"Introduzca primero su email arriba y vuelva a hacer clic.",it:"Inserisci prima la tua email sopra, poi riclicca.",pt:"Introduza primeiro o seu email acima e clique novamente.",tr:"Önce yukarıya e-postanızı girin, sonra tekrar tıklayın.",zh:"请先在上方输入邮箱，然后再次点击。"},
 forgot_sent:{fr:"E-mail de réinitialisation envoyé à {e}.",en:"Reset email sent to {e}.",es:"Email de restablecimiento enviado a {e}.",it:"Email di reimpostazione inviata a {e}.",pt:"Email de redefinição enviado para {e}.",tr:"Sıfırlama e-postası {e} adresine gönderildi.",zh:"重置邮件已发送至 {e}。"},
};
let LANG=(function(){try{return localStorage.getItem('pvtc_lang')||'fr';}catch(e){return 'fr';}})();
if(!C.tab_login[LANG])LANG='fr';
function t(k){const e=C[k];return e?(e[LANG]||e.fr):k;}
function setLang(l){ if(!C.tab_login[l])l='fr'; LANG=l; try{localStorage.setItem('pvtc_lang',l);}catch(e){}
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-ph]').forEach(el=>el.setAttribute('placeholder',t(el.getAttribute('data-ph'))));
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
  document.documentElement.lang=l;
}
setLang(LANG);
function switchTab(t){
  const login=t==="login";
  document.getElementById("tabLogin").classList.toggle("active",login);
  document.getElementById("tabSignup").classList.toggle("active",!login);
  document.getElementById("formLogin").classList.toggle("hidden",!login);
  document.getElementById("formSignup").classList.toggle("hidden",login);
  hideMsg();
}
function showMsg(text,ok){ const m=document.getElementById("msg"); m.textContent=text; m.className="msg "+(ok?"ok":"err"); }
function hideMsg(){ document.getElementById("msg").className="msg"; }

async function routeByRole(){
  const p = await getProfile();
  if(p && p.role==="admin") location.replace("admin.html");
  else location.replace("espace-client.html");
}

async function doLogin(e){
  e.preventDefault(); hideMsg();
  const btn=document.getElementById("btnLogin"); btn.disabled=true; btn.textContent=t("connecting");
  const email=document.getElementById("li_email").value.trim();
  const password=document.getElementById("li_pwd").value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showMsg(t("err_login"),false); btn.disabled=false; btn.textContent=t("btn_login"); return false; }
  await routeByRole();
  return false;
}

async function doSignup(e){
  e.preventDefault(); hideMsg();
  const btn=document.getElementById("btnSignup"); btn.disabled=true; btn.textContent=t("creating");
  const full_name=document.getElementById("su_name").value.trim();
  const phone=document.getElementById("su_phone").value.trim();
  const email=document.getElementById("su_email").value.trim();
  const password=document.getElementById("su_pwd").value;
  const { data, error } = await sb.auth.signUp({ email, password, options:{ data:{ full_name, phone } } });
  if(error){ showMsg(error.message||t("err_signup"),false); btn.disabled=false; btn.textContent=t("btn_signup"); return false; }
  if(data.session){ await routeByRole(); return false; }
  showMsg(t("signup_ok"),true);
  btn.disabled=false; btn.textContent=t("btn_signup");
  return false;
}

async function forgot(){
  const email=(document.getElementById("li_email").value||"").trim();
  if(!email){ showMsg(t("forgot_need"),false); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + "/connexion.html" });
  if(error){ showMsg(error.message,false); return; }
  showMsg(t("forgot_sent").replace("{e}",email),true);
}

// déjà connecté ? on redirige direct
(async()=>{ const s=await getSession(); if(s) routeByRole(); })();
</script>
</body>
</html>
